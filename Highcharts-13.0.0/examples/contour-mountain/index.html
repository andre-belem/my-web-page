<!DOCTYPE HTML>
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Highcharts Example</title>

		<style type="text/css">
:root {
    color-scheme: light dark;
}
* {
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Helvetica,
        Arial,
        "Apple Color Emoji",
        "Segoe UI Emoji",
        "Segoe UI Symbol",
        sans-serif;
}

.highcharts-figure {
    max-width: 800px;
    margin: 1em auto;
}

.highcharts-controls-wrapper {
    max-width: 800px;
    margin: 1em auto;
    padding: 0 10px;
}

highcharts-controls {
    display: inline-block;
}

@media (prefers-color-scheme: dark) {
    body {
        background-color: #141414;
        color: #ddd;
    }
    a {
        color: #2caffe;
    }
}
		</style>
	</head>
	<body>
<script src="../../code/highcharts.js"></script>
<script src="../../code/modules/contour.js"></script>
<script src="../../code/modules/accessibility.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@highcharts/controls@0.8.0" type="module"></script>

<figure class="highcharts-figure">
  <div id="container"></div>
</figure>

<div class="highcharts-controls-wrapper">
  <highcharts-controls>
    <highcharts-group header="Update options">
      <highcharts-control path="series[0].smoothColoring" value="false"></highcharts-control>
      <highcharts-control path="series[0].contourInterval" value="50" min="0" max="100" step="1"></highcharts-control>
      <highcharts-control path="series[0].contourOffset" value="0" min="0" max="50" step="1"></highcharts-control>
      <highcharts-control path="series[0].lineWidth" value="1" min="0" max="2" step="1"></highcharts-control>
    </highcharts-group>
  </highcharts-controls>
</div>


		<script type="text/javascript">
/* eslint-disable */
(async () => {
  const data = await fetch('https://www.highcharts.com/samples/data/contour-mountain-data.json').then(response => response.json());
  Highcharts.chart('container', {
    chart: {
      height: '80%',
      zooming: {
        type: 'xy'
      }
    },
    title: {
      text: 'Mountain topography'
    },
    subtitle: {
      text: 'With WebGPU contour series'
    },
    xAxis: {
      endOnTick: false,
      gridLineColor: '#fff4',
      gridLineWidth: 1,
      gridZIndex: 4,
      labels: {
        align: 'left',
        format: '{value:.2f}°E',
        style: {
          fontSize: '0.6em'
        },
        y: -2
      },
      lineWidth: 0,
      maxPadding: 0,
      minPadding: 0,
      startOnTick: false,
      tickInterval: 0.01,
      tickWidth: 0
    },
    yAxis: {
      title: {
        text: ''
      },
      endOnTick: false,
      gridLineColor: '#fff4',
      gridLineWidth: 1,
      gridZIndex: 4,
      labels: {
        align: 'left',
        format: '{value:.2f}°N',
        style: {
          fontSize: '0.6em'
        },
        x: 2,
        y: -3
      },
      maxPadding: 0,
      minPadding: 0,
      startOnTick: false,
      tickInterval: 0.01
    },
    colorAxis: {
      labels: {
        format: '{value} m'
      },
      stops: [[0, '#447cff'], [0.5, '#f5ff66'], [0.9, '#ff5e4f']]
    },
    legend: {
      title: {
        text: 'Elevation'
      },
      align: 'right',
      layout: 'vertical',
      verticalAlign: 'middle'
    },
    responsive: {
      rules: [{
        chartOptions: {
          chart: {
            height: '130%'
          },
          colorAxis: {
            labels: {
              format: '{value}'
            }
          },
          legend: {
            align: 'center',
            layout: 'horizontal',
            verticalAlign: 'bottom'
          }
        },
        condition: {
          maxWidth: 500
        }
      }]
    },
    series: [{
      clip: true,
      contourInterval: 50,
      contourOffset: 0,
      data: data,
      lineColor: '#888',
      lineWidth: 1,
      marker: {
        states: {
          hover: {
            lineColor: 'white',
            lineWidth: 2
          }
        }
      },
      name: 'Elevation',
      smoothColoring: false,
      states: {
        hover: {
          opacity: 1
        }
      },
      type: 'contour'
    }, {
      colorAxis: false,
      data: [[22.7688, 49.072, 1333, 'Halicz'], [22.7702, 49.062, 1280, 'Rozsypaniec']],
      dataLabels: {
        enabled: true,
        format: '<b>{point.name}</b><br>{point.value} m',
        style: {
          fontWeight: 'normal'
        }
      },
      keys: ['x', 'y', 'value', 'name'],
      marker: {
        fillColor: '#000',
        symbol: 'triangle'
      },
      name: 'Peaks',
      showInLegend: false,
      type: 'scatter'
    }],
    tooltip: {
      pointFormat: `
                Latitude: <strong>{point.x:.2f} ºE</strong>,<br/>
                Longitude: <strong>{point.y:.2f} ºN</strong>,<br/>
                Elevation: <strong>{point.value} m</strong>
            `
    }
  });
})();
		</script>
	</body>
</html>

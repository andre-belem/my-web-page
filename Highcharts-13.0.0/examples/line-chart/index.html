<!DOCTYPE HTML>
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Highcharts Example</title>

		<style type="text/css">
:root {
    color-scheme: light dark;
}
body {
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Helvetica,
        Arial,
        "Apple Color Emoji",
        "Segoe UI Emoji",
        "Segoe UI Symbol",
        sans-serif;
    background: var(--highcharts-background-color);
    color: var(--highcharts-neutral-color-100);
}

.highcharts-figure,
.highcharts-data-table table {
    min-width: 360px;
    max-width: 800px;
    margin: 1em auto;
}

/* Custom CSS for the tooltip */
.highcharts-tooltip {
    caption {
        font-size: 0.9em;
        font-weight: 500;
        padding: 0.5em 0;
        border-bottom: 1px solid var(--highcharts-neutral-color-10);
        text-align: left;
    }

    th {
        font-weight: normal;
        padding: 0.15em 0;
        color: var(--highcharts-neutral-color-60);
    }

    td {
        font-weight: 500;
        padding: 0.15em 0 0.15em 2em;
        text-align: right;
    }

    tr:first-child td,
    tr:first-child th {
        padding-top: 0.75em;
    }

    tr:last-child td,
    tr:last-child th {
        padding-bottom: 0.25em;
    }
}

.highcharts-data-table table {
    font-family: Verdana, sans-serif;
    border-collapse: collapse;
    border: 1px solid var(--highcharts-neutral-color-10, #e6e6e6);
    margin: 10px auto;
    text-align: center;
    width: 100%;
    max-width: 500px;
}

.highcharts-data-table caption {
    padding: 1em 0;
    font-size: 1.2em;
    color: var(--highcharts-neutral-color-60, #666);
}

.highcharts-data-table th {
    font-weight: 600;
    padding: 0.5em;
}

.highcharts-data-table td,
.highcharts-data-table th,
.highcharts-data-table caption {
    padding: 0.5em;
}

.highcharts-data-table thead tr,
.highcharts-data-table tbody tr:nth-child(even) {
    background: var(--highcharts-neutral-color-3, #f7f7f7);
}

.highcharts-description {
    background: light-dark(#f2f6f2, #323232);
    border-radius: 0 4px 4px 0;
    border-left: 2px solid light-dark(#1d6aff, #fff);
    font-size: 0.8rem;
    font-style: italic;
    padding: 8px 16px;
    margin: 2em 10px 1em;
}

@media (prefers-color-scheme: dark) {
    body {
        background-color: #141414;
        color: #ddd;
    }
    a {
        color: #2caffe;
    }
}
		</style>
	</head>
	<body>
<script src="../../code/highcharts.js"></script>
<script src="../../code/modules/series-label.js"></script>
<script src="../../code/modules/exporting.js"></script>
<script src="../../code/modules/export-data.js"></script>
<script src="../../code/modules/accessibility.js"></script>

<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
        Basic line chart showing trends in a dataset. This chart includes the
        <code>series-label</code> module, which adds a label to each line for
        enhanced readability.
    </p>
</figure>





		<script type="text/javascript">
/* eslint-disable */
Highcharts.chart('container', {
  chart: {
    plotBorderColor: 'var(--highcharts-neutral-color-10, #e6e6e6)',
    plotBorderWidth: 1,
    plotBorderRadius: 5
  },
  title: {
    text: 'Application users last 24 hours',
    align: 'left'
  },
  subtitle: {
    text: 'All traffic sources combined'
  },
  yAxis: {
    title: {
      text: 'Unique users'
    }
  },
  xAxis: {
    type: 'datetime',
    crosshair: true,
    dateTimeLabelFormats: {
      // Don't show the date
      day: {
        boundary: '%H:%M',
        main: '%H:%M'
      }
    },
    lineWidth: 0,
    tickLength: 6,
    tickColor: 'var(--highcharts-neutral-color-10, #e6e6e6)'
  },
  legend: {
    enabled: false
  },
  tooltip: {
    shared: true,
    headerFormat: `<table>
            <caption>{point.x:%[HM]} → {(add point.x 3540000):%[HM]}</caption>`,
    pointFormat: `
        <tr>
          <th>
            <svg width="20" height="10">
              <path d="M 5 5 L 13 5" stroke="{series.color}" stroke-width="5"
                stroke-linecap="round" />
            </svg>
            {series.name}
          </th>
          <td>{point.y}</td>
        </tr>
        `,
    footerFormat: '</table>',
    useHTML: true
  },
  // Common options for all series
  plotOptions: {
    series: {
      // There are many ways to handle time data in Highcharts.
      // This way we omit the timestamp from each data point, and
      // rely on each data point being one hour apart.
      pointInterval: 36e5,
      // one hour
      marker: {
        enabled: false
      }
    }
  },
  series: [{
    name: 'Users',
    color: 'light-dark(#0097FF, #27A6FE)',
    data: [990, 652, 965, 1048, 939, 1012, 2089, 3995, 4123, 4302, 5289, 6115, 7723, 8162, 10089, 7812, 4127, 3812, 4156, 3805, 2958, 1984, 1432, 1299]
  }, {
    name: 'Average',
    color: '#8791BA',
    dashStyle: 'ShortDot',
    data: [865, 832, 775, 728, 779, 812, 989, 1095, 1623, 2102, 2289, 2315, 2412, 2662, 3089, 2812, 2427, 2112, 2356, 2305, 1858, 1084, 932, 899]
  }]
});
		</script>
	</body>
</html>

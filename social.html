<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ícones Flutuantes</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family:Arial, sans-serif;
        min-height:100vh;
    }

    /* Container dos ícones */
    .social-float{
        position: fixed;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 12px;
        z-index: 9999;
    }

    /* Botões */
    .social-float a{
        width:60px;
        height:60px;
        border-radius:50%;
        background:#fff;
        box-shadow:0 4px 10px rgba(0,0,0,0.25);
        display:flex;
        justify-content:center;
        align-items:center;
        transition:0.3s;
        text-decoration:none;
    }

    .social-float a:hover{
        transform:scale(1.15);
    }

    /* Imagens */
    .social-float img{
        width:34px;
        height:34px;
        object-fit:contain;
    }
</style>

</head>
<body>

<div class="social-float">
    <a href="https://www.linkedin.com/in/andre-belem-br" target="_blank">
        <img src="imgs/linkedin.png" alt="Facebook">
    </a>

    <a href="https://www.instagram.com/andre.belem.br/" target="_blank">
        <img src="imgs/instagram.png" alt="Facebook">
    </a>

    <a href="https://www.facebook.com/belem.andre" target="_blank">
        <img src="imgs/facebook.png" alt="Facebook">
    </a>

    <a href="https://www.youtube.com/@andre-belem" target="_blank">
        <img src="imgs/youtube.png" alt="YouTube">
    </a>

    <a href="https://github.com/andre-belem" target="_blank">
        <img src="imgs/github.png" alt="GitHub">
    </a>

    <a href="https://wa.me/5541995883231" target="_blank">
        <img src="imgs/whatsapp.png" alt="WhatsApp">
    </a>

</div>

</body>
</html>

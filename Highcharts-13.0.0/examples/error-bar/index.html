<!DOCTYPE HTML>
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Highcharts Example</title>

		<style type="text/css">
:root {
    color-scheme: light dark;
}
body {
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Helvetica,
        Arial,
        "Apple Color Emoji",
        "Segoe UI Emoji",
        "Segoe UI Symbol",
        sans-serif;
    background: var(--highcharts-background-color);
    color: var(--highcharts-neutral-color-100);
}

.highcharts-figure,
.highcharts-data-table table {
    min-width: 310px;
    max-width: 800px;
    margin: 1em auto;
}

#container {
    height: 400px;
}

.highcharts-data-table table {
    font-family: Verdana, sans-serif;
    border-collapse: collapse;
    border: 1px solid var(--highcharts-neutral-color-10, #e6e6e6);
    margin: 10px auto;
    text-align: center;
    width: 100%;
    max-width: 500px;
}

.highcharts-data-table caption {
    padding: 1em 0;
    font-size: 1.2em;
    color: var(--highcharts-neutral-color-60, #666);
}

.highcharts-data-table th {
    font-weight: 600;
    padding: 0.5em;
}

.highcharts-data-table td,
.highcharts-data-table th,
.highcharts-data-table caption {
    padding: 0.5em;
}

.highcharts-data-table thead tr,
.highcharts-data-table tbody tr:nth-child(even) {
    background: var(--highcharts-neutral-color-3, #f7f7f7);
}

.highcharts-description {
    background: light-dark(#f2f6f2, #323232);
    border-radius: 0 4px 4px 0;
    border-left: 2px solid light-dark(#1d6aff, #fff);
    font-size: 0.8rem;
    font-style: italic;
    padding: 8px 16px;
    margin: 2em 10px 1em;
}

@media (prefers-color-scheme: dark) {
    body {
        background-color: #141414;
        color: #ddd;
    }
    a {
        color: #2caffe;
    }
}
		</style>
	</head>
	<body>
<script src="../../code/highcharts.js"></script>
<script src="../../code/highcharts-more.js"></script>
<script src="../../code/modules/exporting.js"></script>
<script src="../../code/modules/export-data.js"></script>
<script src="../../code/modules/accessibility.js"></script>

<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
        Chart showing the use of error bar series to visualize uncertainty or
        error in datasets. In this demo, both the line series and the column
        series have error bars attached to them, showing the uncertainty range.
    </p>
</figure>



		<script type="text/javascript">
Highcharts.chart('container', {
    dataTable: {
        columns: {
            Month: [
                'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'
            ],
            Rainfall: [
                49.9, 71.5, 106.4, 129.2, 144.0, 176.0, 135.6, 148.5, 216.4,
                194.1, 95.6, 54.4
            ],
            RainfallErrorLow: [
                48, 68, 92, 128, 140, 171, 135, 142, 204, 189, 95, 52
            ],
            RainfallErrorHigh: [
                51, 73, 110, 136, 150, 179, 143, 149, 220, 199, 110, 56
            ],
            Temperature: [
                7.0, 6.9, 9.5, 14.5, 18.2, 21.5, 25.2, 26.5, 23.3, 18.3,
                13.9, 9.6
            ],
            TemperatureErrorLow: [
                6, 5.9, 9.4, 14.1, 18.0, 21.0, 23.2, 26.1, 23.2, 18.0, 12.9, 7.6
            ],
            TemperatureErrorHigh: [
                8, 7.6, 10.4, 15.9, 20.1, 24.0, 25.3, 27.8, 23.9, 21.1,
                14.0, 10.0
            ]
        }
    },
    chart: {
        zooming: {
            type: 'xy'
        }
    },
    title: {
        text: 'Temperature vs Rainfall'
    },
    xAxis: [
        {
            type: 'category'
        }
    ],
    yAxis: [
        {
            // Primary yAxis
            labels: {
                format: '{value} °C'
            },
            title: {
                text: 'Temperature'
            },
            lineColor: '#CC8800',
            lineWidth: 2
        },
        {
            // Secondary yAxis
            title: {
                text: 'Rainfall'
            },
            labels: {
                format: '{value} mm'
            },
            lineColor: '#6b8abc',
            lineWidth: 2,
            opposite: true
        }
    ],

    tooltip: {
        shared: true
    },

    plotOptions: {
        series: {
            dataMapping: {
                name: 'Month'
            }
        }
    },

    series: [
        {
            name: 'Rainfall',
            type: 'column',
            color: '#6b8abc',
            yAxis: 1,
            dataMapping: {
                y: 'Rainfall'
            },
            tooltip: {
                pointFormat:
                    '<span style="font-weight: bold; color: {series.color}">' +
                    '{series.name}</span>: <b>{point.y:.1f} mm</b> '
            }
        },
        {
            name: 'Rainfall error',
            type: 'errorbar',
            yAxis: 1,
            dataMapping: {
                low: 'RainfallErrorLow',
                high: 'RainfallErrorHigh'
            },
            tooltip: {
                pointFormat: '(error range: {point.low}-{point.high} mm)<br/>'
            },
            pointPlacement: -0.2
        },
        {
            name: 'Temperature',
            type: 'spline',
            color: '#CC8800',
            lineWidth: 2,
            dataMapping: {
                y: 'Temperature'
            },
            tooltip: {
                pointFormat:
                    '<span style="font-weight: bold; color: {series.color}">' +
                    '{series.name}</span>: <b>{point.y:.1f}°C</b> '
            }
        },
        {
            name: 'Temperature error',
            type: 'errorbar',
            dataMapping: {
                low: 'TemperatureErrorLow',
                high: 'TemperatureErrorHigh'
            },
            tooltip: {
                pointFormat: '(error range: {point.low}-{point.high}°C)<br/>'
            },
            pointPlacement: 0.1
        }
    ]
});

		</script>
	</body>
</html>

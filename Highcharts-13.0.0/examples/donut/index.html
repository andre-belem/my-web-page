<!DOCTYPE HTML>
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Highcharts Example</title>

		<style type="text/css">
:root {
    color-scheme: light dark;
}
* {
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Helvetica,
        Arial,
        "Apple Color Emoji",
        "Segoe UI Emoji",
        "Segoe UI Symbol",
        sans-serif;
}

.highcharts-figure {
    min-width: 320px;
    max-width: 800px;
    margin: 1em auto;
}

.highcharts-description {
    background: light-dark(#f2f6f2, #323232);
    border-radius: 0 4px 4px 0;
    border-left: 2px solid light-dark(#1d6aff, #fff);
    font-size: 0.8rem;
    font-style: italic;
    padding: 8px 16px;
    margin: 2em 10px 1em;
}

@media (prefers-color-scheme: dark) {
    body {
        background-color: #141414;
        color: #ddd;
    }
    a {
        color: #2caffe;
    }
}
		</style>
	</head>
	<body>
<script src="../../code/highcharts.js"></script>
<script src="../../code/modules/exporting.js"></script>
<script src="../../code/modules/accessibility.js"></script>
<script src="../../code/themes/adaptive.js"></script>

<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
        In Highcharts, pie charts can also feature an empty center, they are
        often referred to as donut charts.
    </p>
</figure>



		<script type="text/javascript">
/* eslint-disable */
Highcharts.chart('container', {
  chart: {
    type: 'pie'
  },
  title: {
    text: 'Charity allocations'
  },
  tooltip: {
    valueSuffix: '%'
  },
  series: [{
    name: 'Allocation',
    borderRadius: 8,
    // Rounded slice corners
    borderWidth: 3,
    innerSize: '70%',
    // Turning the pie into a donut
    // We can show multiple data labels per point
    dataLabels: [{
      format: '{point.name}'
    }, {
      format: '{point.percentage:.0f}%',
      distance: '-15%',
      // Placing the label inside
      backgroundColor: 'contrast',
      style: {
        textOutline: 'none'
      }
    }],
    data: [['Health care', 34], ['Education', 27], ['Youth programmes', 22], ['Poverty measures', 8], ['Elderly care', 6], ['Other', 3]]
  }]
});
		</script>
	</body>
</html>
